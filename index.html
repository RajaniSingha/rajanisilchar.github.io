<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First HTML Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            width:400px;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 20px rgba(0,0,0,0.3);
            text-align:center;
        }

        h1{
            color:#333;
            margin-bottom:10px;
        }

        p{
            color:#666;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>Student Registration</h1>

    <p>Welcome to My First HTML Page</p>

    <form>

        <input type="text" placeholder="Enter Your Name">

        <input type="text" placeholder="Enter Your Class">

        <button type="submit">Submit</button>

    </form>

</div>

</body>
</html>
